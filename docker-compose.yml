services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -lc "bin/rails db:prepare && bin/rails server -b 0.0.0.0"
    environment:
      RAILS_ENV: development
      DB_HOST: db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - .:/rails

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
